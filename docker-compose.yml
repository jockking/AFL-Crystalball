services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      # Persist the 6-hour API cache across container restarts
      - cache_data:/app/data/cache
    networks:
      - app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/sources')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app

volumes:
  cache_data:

networks:
  app:
    driver: bridge
